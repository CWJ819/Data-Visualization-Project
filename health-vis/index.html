<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HealthVis — 健康数据可视化分析</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <div id="error-debug" style="display:none;color:red;padding:20px;background:#1a0000;font-family:monospace;font-size:14px;position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;overflow:auto;white-space:pre-wrap;"></div>
    <script>
      // Global error capture — displays errors visibly instead of blank page
      window.onerror = function(msg, url, line, col, err) {
        var el = document.getElementById('error-debug');
        if (el) {
          el.style.display = 'block';
          el.innerHTML = '<h2 style=color:#ff6b6b>JS Error:</h2>' +
            '<b>Message:</b> ' + (err?.message || msg) + '<br>' +
            '<b>File:</b> ' + url + ':' + line + ':' + col + '<br>' +
            '<b>Stack:</b><br>' + (err?.stack || 'no stack').replace(/\\n/g, '<br>') +
            '<hr><small>If you see this, React failed to mount. Check console (F12) for more.</small>';
        }
      };
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('error-debug');
        if (el) {
          el.style.display = 'block';
          el.innerHTML += '<hr><h2 style=color:#ffa500>Unhandled Promise:</h2>' +
            (e.reason?.message || e.reason) + '<br>' +
            (e.reason?.stack || '').replace(/\\n/g, '<br>');
        }
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
